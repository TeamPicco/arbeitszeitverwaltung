services:
  # ── Landingpage (Static Site) ─────────────────────────────
  - type: web
    name: complio-landing
    runtime: static
    staticPublishPath: ./landing
    pullRequestPreviewsEnabled: false

  # ── Bestehender Web-Service ───────────────────────────────
  - type: web
    name: complio-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DOCUMENT_ENCRYPTION_KEY
        sync: false
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Complio
      - key: BUNDESLAND
        value: SN
      - key: SESSION_TIMEOUT_MINUTES
        value: "480"
      - key: GOOGLE_PLACES_API_KEY
        sync: false

  # ── Cron Job: täglicher Outreach-Runner ──────────────────
  - type: cron
    name: complio-outreach
    runtime: python
    schedule: "0 8 * * *"        # täglich 08:00 Uhr UTC (= 09:00/10:00 Uhr DE)
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/outreach_runner.py
    plan: starter
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Complio
      - key: GOOGLE_PLACES_API_KEY
        sync: false

  # ── Cron Job: monatliche DSGVO-Löschroutine ──────────────
  - type: cron
    name: complio-dsgvo-loeschung
    runtime: python
    schedule: "0 3 1 * *"        # jeden 1. des Monats, 03:00 Uhr UTC
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/dsgvo_loeschung.py
    plan: starter
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
